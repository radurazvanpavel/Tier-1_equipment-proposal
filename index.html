<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Medima Iași — uMR Omega 3T · uCT 780</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&family=Red+Hat+Text:wght@400;500;700&family=Red+Hat+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#37008D; --secondary:#7D5DE7; --accent:#2AD1BC;
  --ink:#1D1D29; --line:#E7E3EE; --bg:#F7F5FC; --card:#FFFFFF;
  --muted:#5D5876;
  --grad:linear-gradient(120deg,#37008D 0%,#5A2BC0 55%,#7D5DE7 100%);
  --grad-num:linear-gradient(120deg,#37008D,#7D5DE7 70%);
  --shadow:0 10px 34px -14px rgba(55,0,141,.22);
  --r:20px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
html,body{overflow-x:hidden}
body{font-family:'Red Hat Text',system-ui,sans-serif;background:
  radial-gradient(900px 420px at 85% -80px, rgba(42,209,188,.10), transparent 60%),
  radial-gradient(1000px 520px at -120px 12%, rgba(125,93,231,.10), transparent 60%),
  var(--bg);
  color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
#app{max-width:1120px;margin:0 auto;padding:0 20px 70px}
h1,h2,h3{font-family:'Red Hat Display',sans-serif;color:var(--primary)}

/* ── topbar ── */
.topbar{position:sticky;top:0;z-index:50;background:rgba(247,245,252,.82);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(55,0,141,.08);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.brand{font-family:'Red Hat Display';font-weight:900;color:var(--primary);font-size:18px;display:flex;align-items:center;gap:9px}
.brand img{height:27px;width:auto;display:block}
.brand small{font-weight:700;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);border-left:1px solid var(--line);padding-left:9px}
.lang-switch{display:flex;background:#fff;border:1px solid var(--line);border-radius:999px;padding:3px;box-shadow:var(--shadow)}
.lang-switch button{border:none;background:transparent;color:var(--primary);font-family:'Red Hat Text';font-weight:700;font-size:12px;padding:6px 13px;cursor:pointer;border-radius:999px;transition:.2s}
.lang-switch button.active{background:var(--grad);color:#fff}
@media(max-width:520px){.brand small{display:none}}

/* ── tabs ── */
.tabbar{position:sticky;top:53px;z-index:40;display:flex;gap:6px;overflow-x:auto;padding:12px 0 10px;
  background:linear-gradient(to bottom,rgba(247,245,252,.96),rgba(247,245,252,.9));backdrop-filter:blur(8px);
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabbar::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 17px;
  font-family:'Red Hat Text';font-weight:700;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap;transition:.2s}
.tab:hover{border-color:var(--secondary);color:var(--primary)}
.tab.active{background:var(--grad);border-color:transparent;color:#fff;box-shadow:var(--shadow)}
.tab .n{font-family:'Red Hat Mono';font-size:10px;opacity:.55;margin-right:6px}
.tab.active .n{opacity:.8}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadein .3s ease}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.tab-panel.active{animation:none}html{scroll-behavior:auto}}

/* ── hero ── */
.hero{margin-top:16px;background:var(--grad);border-radius:26px;padding:clamp(26px,4vw,46px);color:#fff;position:relative;overflow:hidden;box-shadow:0 24px 60px -22px rgba(55,0,141,.5)}
.hero::after{content:"";position:absolute;inset:0;background:
  radial-gradient(560px 260px at 88% 0%, rgba(42,209,188,.22), transparent 65%),
  radial-gradient(420px 320px at 0% 110%, rgba(255,255,255,.08), transparent 60%);pointer-events:none}
.hero-grid{display:grid;grid-template-columns:1.25fr .75fr;gap:clamp(20px,4vw,52px);align-items:center;position:relative;z-index:1}
.hero .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:#fff;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:6px 14px;margin-bottom:18px;backdrop-filter:blur(4px)}
.hero .eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent)}
.hero h1{font-size:clamp(24px,4vw,40px);font-weight:900;line-height:1.1;color:#fff;letter-spacing:-.015em;margin-bottom:14px}
.hero p.sub{font-size:15px;opacity:.9;max-width:52ch}
.hero .meta{margin-top:22px;font-size:12.5px;display:flex;flex-wrap:wrap;gap:8px}
.hero .meta span{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:5px 13px}

/* dual-system hero panel */
.hero-panel{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.22);border-radius:20px;
  padding:24px 26px;backdrop-filter:blur(6px);display:grid;gap:20px;width:100%;max-width:340px;margin:0 auto;
  box-shadow:0 18px 44px -20px rgba(0,0,0,.45)}
.sys .lbl{font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.8;margin-bottom:5px}
.sys b{display:block;font-family:'Red Hat Mono';font-weight:700;font-size:clamp(30px,4vw,40px);letter-spacing:-.02em;line-height:1}
.sys.mr b{color:var(--accent)}
.sys.ct b{color:#C9B8F8}
.sys span{font-size:12.5px;opacity:.85;display:block;margin-top:5px;line-height:1.4}
.sys + .sys{border-top:1px solid rgba(255,255,255,.16);padding-top:20px}
@media(max-width:760px){.hero-grid{grid-template-columns:1fr}}

/* ── sections ── */
section{padding:32px 0 6px}
section.tight{padding-top:14px}
.sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.sec-head h2{font-size:clamp(21px,3vw,29px);font-weight:900;letter-spacing:-.01em}
.sec-head.sub{margin-top:30px}
.sec-head.sub h2{font-size:clamp(18px,2.5vw,24px)}
.sec-tag{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
  background:linear-gradient(120deg,var(--accent),#4FDCC9);-webkit-background-clip:text;background-clip:text;color:transparent}
.lead{color:var(--muted);margin-bottom:10px;font-size:15px}

/* overview: stat strip */
.statstrip{display:grid;grid-template-columns:repeat(5,1fr);background:#fff;border:1px solid rgba(55,0,141,.07);
  border-radius:20px;box-shadow:var(--shadow);margin-top:14px;overflow:hidden}
.statstrip .cell{padding:22px 14px 20px;text-align:center;border-left:1px solid var(--line);border-top:1px solid var(--line);margin:-1px 0 0 -1px}
.statstrip b{display:block;font-family:'Red Hat Mono';font-weight:700;font-size:clamp(20px,2.1vw,26px);letter-spacing:-.02em;
  background:var(--grad-num);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:5px}
.statstrip span{font-size:11.5px;color:var(--muted);line-height:1.4;display:block}
@media(max-width:980px){.statstrip{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.statstrip{grid-template-columns:repeat(2,1fr)}}
.kicker{margin:16px auto 0;text-align:center;font-size:15px;font-weight:500;color:var(--ink)}
.kicker::before{content:"";display:block;width:44px;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--secondary));margin:0 auto 12px}
.mini{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.mini i{font-style:normal;font-family:'Red Hat Display';font-weight:700;font-size:11px;color:var(--primary);background:#F3EFFB;border-radius:999px;padding:5px 11px}

/* cards */
.grid{display:grid;gap:14px;margin-top:14px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.card{background:var(--card);border:1px solid rgba(55,0,141,.07);border-radius:var(--r);padding:20px 22px;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s}
.card:hover{transform:translateY(-2px);box-shadow:0 16px 40px -14px rgba(55,0,141,.28)}
.card h4{font-family:'Red Hat Display';font-size:15px;color:var(--primary);margin-bottom:8px}
.card p{font-size:13.5px;color:var(--muted)}
.stat b{display:block;font-family:'Red Hat Mono';font-weight:700;font-size:clamp(22px,2.6vw,30px);letter-spacing:-.02em;margin-bottom:5px;
  background:var(--grad-num);-webkit-background-clip:text;background-clip:text;color:transparent}
.stat span{font-size:12.5px;color:var(--muted);line-height:1.4;display:block}
.card.tealtop{border-top:3px solid var(--accent)}
.card.violettop{border-top:3px solid var(--secondary)}

/* feature list */
ul.feat{list-style:none;margin-top:16px;display:grid;gap:10px}
ul.feat li{background:#fff;border:1px solid rgba(55,0,141,.07);border-radius:14px;padding:12px 16px 12px 42px;position:relative;font-size:13.5px;box-shadow:0 6px 20px -14px rgba(55,0,141,.25)}
ul.feat li::before{content:"";position:absolute;left:16px;top:17px;width:12px;height:12px;border-radius:4px;background:linear-gradient(135deg,var(--accent),var(--secondary))}
ul.feat li b{color:var(--primary)}
.note{background:#fff;border:1px solid rgba(55,0,141,.07);border-left:4px solid var(--accent);border-radius:0 14px 14px 0;padding:14px 18px;font-size:14px;margin-top:16px;box-shadow:var(--shadow)}
.note b{color:var(--primary)}

/* price cards */
.price-card .tier{font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.price-card .name{font-family:'Red Hat Display';font-weight:900;font-size:17px;color:var(--primary)}
.price-card .amount{font-family:'Red Hat Mono';font-weight:700;font-size:clamp(21px,2.4vw,26px);margin:10px 0 12px;
  background:var(--grad-num);-webkit-background-clip:text;background-clip:text;color:transparent}
.price-card .amount small{font-size:12px;color:var(--muted);-webkit-text-fill-color:var(--muted)}
.price-card ul{list-style:none;font-size:12.5px;color:var(--muted);display:grid;gap:5px}
.price-card ul li{padding-left:16px;position:relative}
.price-card ul li::before{content:"✓";position:absolute;left:0;color:var(--accent);font-weight:900}
.price-card ul li.x::before{content:"–";color:#C4452F}
.fine{font-size:12px;color:var(--muted);margin-top:16px;line-height:1.6}

/* pillars — light */
.pillar{border-top:3px solid var(--accent)}
.pillar b.k{font-family:'Red Hat Display';font-weight:900;font-size:12px;letter-spacing:.13em;text-transform:uppercase;display:block;margin-bottom:8px;
  background:var(--grad-num);-webkit-background-clip:text;background-clip:text;color:transparent}

/* recommendation panel */
.reco{margin-top:26px;background:var(--grad);border-radius:26px;padding:clamp(24px,3.4vw,40px);color:#fff;position:relative;overflow:hidden;box-shadow:0 24px 60px -22px rgba(55,0,141,.5)}
.reco::after{content:"";position:absolute;inset:0;background:radial-gradient(560px 260px at 90% 0%, rgba(42,209,188,.24), transparent 65%);pointer-events:none}
.reco>*{position:relative;z-index:1}
.reco .tag{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#fff;
  background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:6px 14px;margin-bottom:14px}
.reco .tag::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent)}
.reco h2{color:#fff;font-size:clamp(20px,2.8vw,28px);margin-bottom:10px;letter-spacing:-.01em}
.reco p{font-size:14.5px;opacity:.92;max-width:80ch}
.reco-ask{margin-top:20px;display:flex;gap:14px;align-items:flex-start;background:rgba(255,255,255,.1);border:1px solid rgba(42,209,188,.55);border-radius:16px;padding:16px 18px;font-size:14px;backdrop-filter:blur(4px)}
.reco-ask::before{content:"→";flex:0 0 30px;height:30px;border-radius:9px;background:var(--accent);color:var(--ink);font-weight:900;display:flex;align-items:center;justify-content:center;font-size:15px}
.reco-ask b{color:#fff}
footer{margin-top:46px;padding-top:18px;border-top:1px solid var(--line);font-size:11.5px;color:#8a86a0;line-height:1.6}

/* ── password gate ── */
#gate{position:fixed;inset:0;z-index:200;background:var(--grad);display:flex;align-items:center;justify-content:center;padding:20px}
#gate::after{content:"";position:absolute;inset:0;background:radial-gradient(700px 340px at 80% 10%, rgba(42,209,188,.25), transparent 60%);pointer-events:none}
.gate-card{background:#fff;border-radius:24px;padding:38px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.4);position:relative;z-index:1}
.gate-card .brand{font-size:26px;margin-bottom:8px;justify-content:center}
.gate-card .brand img{height:40px}
.gate-card h2{font-size:18px;margin-bottom:4px}
.gate-card p{font-size:13px;color:var(--muted);margin-bottom:20px}
.gate-card input{width:100%;border:1.5px solid var(--line);border-radius:14px;padding:12px 14px;font-family:'Red Hat Text';font-size:15px;text-align:center;letter-spacing:.08em;outline:none;transition:.2s}
.gate-card input:focus{border-color:var(--secondary);box-shadow:0 0 0 4px rgba(125,93,231,.15)}
.gate-card input.err{border-color:#C4452F;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.gate-card button{margin-top:14px;width:100%;border:none;border-radius:14px;padding:13px;background:var(--grad);color:#fff;font-family:'Red Hat Display';font-weight:700;font-size:15px;cursor:pointer;transition:.2s;box-shadow:var(--shadow)}
.gate-card button:hover{filter:brightness(1.12)}
.gate-err{display:none;color:#C4452F;font-size:12.5px;margin-top:10px;font-weight:700}
body.locked{overflow:hidden}

/* desktop presentation scale — subtle */
@media(min-width:900px){body{zoom:1.1}}
/* mobile */
@media(max-width:820px){.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){
  .g2{grid-template-columns:1fr}
  .g3.solo{grid-template-columns:1fr}
}
@media(max-width:430px){.g3{grid-template-columns:1fr 1fr}}
</style>
</head>
<body class="locked">

<div id="gate">
  <div class="gate-card">
    <div class="brand"><img id="logoGate" alt="Medima">Medima</div>
    <h2>Acces restricționat</h2>
    <p>Document intern · Internal document · Document interne</p>
    <input type="password" id="gatePass" placeholder="Parolă / Password" autocomplete="off" onkeydown="if(event.key==='Enter')unlock()">
    <button onclick="unlock()">Deschide · Open · Ouvrir</button>
    <div class="gate-err" id="gateErr">Parolă incorectă · Wrong password · Mot de passe incorrect</div>
  </div>
</div>

<div class="topbar">
  <div class="brand"><img id="logoTop" alt="Medima">Medima<small id="brandTag">Clinica Iași</small></div>
  <div class="lang-switch">
    <button data-lang="ro" class="active" onclick="setLang('ro')">RO</button>
    <button data-lang="en" onclick="setLang('en')">EN</button>
    <button data-lang="fr" onclick="setLang('fr')">FR</button>
  </div>
</div>

<div id="app"></div>

function setTab(i){
  currentTab=i;
  document.querySelectorAll('.tab').forEach((b,bi)=>{b.classList.toggle('active',bi===i);b.setAttribute('aria-selected',bi===i);});

function unlock(){
  const inp=document.getElementById('gatePass');
  if(inp.value==='Medima2027'){
    document.getElementById('gate').style.display='none';
    document.body.classList.remove('locked');
  }else{
    inp.classList.remove('err');void inp.offsetWidth;inp.classList.add('err');
    document.getElementById('gateErr').style.display='block';
    inp.select();
  }
}
